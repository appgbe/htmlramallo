<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Certificado de Análisis - Materias Primas</title>
  <style>
    @page { size: A4 portrait; margin: 12mm; }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: Arial, sans-serif;
      font-size: 11px;
      color: #1a1a1a;
      background: #fff;
      width: 210mm;
      min-height: 297mm;
      margin: 0 auto;
      padding: 12mm;
    }
    .header { display: flex; align-items: stretch; border: 1.5px solid #1a1a1a; }
    .header-logo { padding: 8px 12px; border-right: 1.5px solid #1a1a1a; display: flex; align-items: center; justify-content: center; min-width: 80px; }
    .header-logo img { width: 58px; height: 58px; object-fit: contain; }
    .header-title { flex: 1; display: flex; align-items: center; justify-content: center; text-align: center; padding: 10px 20px; }
    .header-title h1 { font-size: 14px; font-weight: 700; line-height: 1.5; }
    .tabla-general { width: 100%; border-collapse: collapse; border: 1.5px solid #1a1a1a; border-top: none; }
    .tabla-general td { border: 0.5px solid #1a1a1a; padding: 4px 8px; }
    .tabla-general td.label { font-weight: 700; width: 36%; background: #f2f2f2; }
    .tabla-analisis { width: 100%; border-collapse: collapse; border: 1.5px solid #1a1a1a; border-top: none; }
    .tabla-analisis th, .tabla-analisis td { border: 0.5px solid #1a1a1a; padding: 4px 6px; text-align: center; }
    .tabla-analisis th:first-child, .tabla-analisis td:first-child { text-align: left; background: #f2f2f2; font-weight: 700; width: 105px; white-space: nowrap; }
    .tabla-analisis thead th { background: #f2f2f2; font-weight: 700; }
    .tabla-analisis tbody td { background: #fff; }
    .tabla-analisis tbody td:first-child { background: #f2f2f2; }
    .off-spec { background-color: #fff3cd !important; font-weight: 700 !important; color: #7d4e00; }
    .tabla-inferior { width: 100%; border-collapse: collapse; border: 1.5px solid #1a1a1a; border-top: none; }
    .tabla-inferior td { border: 0.5px solid #1a1a1a; padding: 6px 8px; vertical-align: top; }
    .tabla-inferior td.label { width: 120px; background: #fff; }
    .nota { border: 1.5px solid #1a1a1a; border-top: none; padding: 6px 10px; font-style: italic; text-align: center; font-size: 10px; }
    .footer-firmas { display: flex; border: 1.5px solid #1a1a1a; border-top: none; }
    .firma { flex: 1; text-align: center; padding: 20px 10px 8px; font-size: 10px; border-right: 0.5px solid #1a1a1a; }
    .firma:last-child { border-right: none; }
    .firma-rol { font-weight: 700; margin-top: 3px; }
    .pagina { flex: 0.5; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 700; }
    .btn-print { display: block; margin: 14px auto; padding: 9px 26px; background: #2d5016; color: white; border: none; border-radius: 4px; font-size: 13px; font-weight: 600; cursor: pointer; }
    .btn-print:hover { background: #3d6b1e; }
    @media print { body { padding: 0; width: 100%; } .no-print { display: none; } }
  </style>
</head>
<body>

  <button class="btn-print no-print" onclick="window.print()">Imprimir / Guardar PDF</button>

  <div class="header">
    <div class="header-logo">
      <img src="https://media.licdn.com/dms/image/v2/C4E0BAQEgKomyV9IoGA/company-logo_200_200/company-logo_200_200/0/1631716602142?e=2147483647&v=beta&t=ZXshAMvNx7akSLYXQVDHM6LgVG8en4IZgVEebaTEZX4" alt="Logo GBE" />
    </div>
    <div class="header-title">
      <h1>CERTIFICADO DE ANALISIS<br>MATERIAS PRIMAS</h1>
    </div>
  </div>

  <table class="tabla-general">
    <tr><td class="label">PRODUCTO</td><td id="producto"></td></tr>
    <tr><td class="label">N ANALISIS</td><td id="numero"></td></tr>
    <tr><td class="label">FECHA</td><td id="fecha"></td></tr>
    <tr><td class="label">PROCEDENCIA</td><td id="proveedor"></td></tr>
    <tr><td class="label">N DE REMITO</td><td id="remito"></td></tr>
    <tr><td class="label">TRANSPORTE</td><td id="transporte"></td></tr>
    <tr><td class="label">CHOFER</td><td id="chofer"></td></tr>
    <tr><td class="label">DNI</td><td id="dni"></td></tr>
    <tr><td class="label">PATENTE (CHASIS)</td><td id="chasis"></td></tr>
  </table>

  <table class="tabla-analisis">
    <thead id="thead"></thead>
    <tbody id="tbody"></tbody>
  </table>

  <table class="tabla-inferior">
    <tr><td class="label">Motivo de reclamo</td><td id="motivoReclamo"></td></tr>
    <tr><td class="label">Precintos cortados</td><td id="precintos"></td></tr>
    <tr><td class="label">Observaciones</td><td id="observaciones"></td></tr>
  </table>

  <div class="nota"><em>El muestreo es realizado segun Norma IRAM 5502</em></div>

  <div class="footer-firmas">
    <div class="firma"><div>Elaboro:</div><div class="firma-rol">JEFE DE CALIDAD</div></div>
    <div class="firma"><div>Aprobo:</div><div class="firma-rol">GERENTE DE PLANTA</div></div>
    <div class="pagina">Pagina 1 de 1</div>
  </div>

<script>
  // Orden fijo de columnas en [muestras concat]
  // Debe coincidir exactamente con la formula de AppSheet
  const ORDEN_MUESTRAS = [
    "Muestra",        // pos 0 - numero de muestra
    "Acidez",         // pos 1
    "Humedad",        // pos 2
    "Sedimentos",     // pos 3
    "Fosforo",        // pos 4
    "Densidad",       // pos 5
    "Concentracion",  // pos 6
    "I. Acidez",      // pos 7
    "Glicerol",       // pos 8
    "MONG",           // pos 9
    "Cenizas",        // pos 10
    "Azufre",         // pos 11
    "Metanol",        // pos 12
    "pH"              // pos 13
  ];

  // Alias para normalizar nombres con tilde o variantes
  const ALIAS = {
    "Fósforo":                         "Fosforo",
    "Fosforo":                         "Fosforo",
    "Concentración":                   "Concentracion",
    "Concentracion":                   "Concentracion",
    "Índice de Acidez":                "I. Acidez",
    "Índice de acidez":                "I. Acidez",
    "Indice de acidez":                "I. Acidez",
    "I. Acidez":                       "I. Acidez",
    "Triglicérido":                    "Triglicerido",
    "Triglicerido":                    "Triglicerido",
    "Monoglicéridos":                  "Monogliceridos",
    "Monogliceridos":                  "Monogliceridos",
    "Diglicéridos":                    "Digliceridos",
    "Digliceridos":                    "Digliceridos",
    "Índice de Iodo":                  "Indice de Iodo",
    "Indice de Iodo":                  "Indice de Iodo",
    "Estabilidad Oxidativa":           "Estabilidad oxidativa",
    "Estabilidad oxidativa":           "Estabilidad oxidativa",
    "Contenido de Ester":              "Contenido de ester",
    "Contenido de ester":              "Contenido de ester",
    "Metil ester de acido linolenico": "Metil ester acido linolenico",
    "Cold soak filterability (CSFT)":  "CSFT",
    "Viscosidad cinematica a 40C":     "Viscosidad cinematica 40",
    "Viscosidad cinematica 40C":       "Viscosidad cinematica 40",
    "Contaminacion total":             "Contaminacion total",
    "Materia grasa":                   "Materia Grasa",
    "Glicerol libre":                  "Glicerol libre",
    "Glicerol total":                  "Glicerol total",
  };

  function normalizar(nombre) {
    const limpio = nombre.trim();
    return ALIAS[limpio] !== undefined ? ALIAS[limpio] : limpio;
  }

  // Catalogo: metodo y unidad por determinacion normalizada
  const CATALOGO = {
    "Acidez":                       { metodo: "IRAM 5512",           unidad: "g Oleico/100 g" },
    "Humedad":                      { metodo: "IRAM 5510",           unidad: "%"              },
    "Sedimentos":                   { metodo: "IRAM 5521",           unidad: "%"              },
    "Fosforo":                      { metodo: "ISO 10540-1",         unidad: "mg/kg"          },
    "Densidad":                     { metodo: "ASTM D4052",          unidad: "g/cm3"          },
    "Concentracion":                { metodo: "",                    unidad: "%"              },
    "I. Acidez":                    { metodo: "ASTM D4928-12",       unidad: "mg/kg"          },
    "Glicerol":                     { metodo: "BS-5711-3 1979",      unidad: "%"              },
    "MONG":                         { metodo: "BS-5711-9/ISO 2464",  unidad: "%"              },
    "Cenizas":                      { metodo: "BS-5711 6 1979",      unidad: "%"              },
    "Azufre":                       { metodo: "ASTM 5453",           unidad: "mg/kg"          },
    "Metanol":                      { metodo: "EN 14110",            unidad: "%"              },
    "pH":                           { metodo: "",                    unidad: "N/A"            },
    "Jabones":                      { metodo: "IRAM 5599",           unidad: "mg/kg"          },
    "Centrifugado":                 { metodo: "",                    unidad: "%"              },
    "Indice de Iodo":               { metodo: "",                    unidad: ""               },
    "Material insaponificable":     { metodo: "",                    unidad: ""               },
    "MIU":                          { metodo: "",                    unidad: ""               },
    "Monogliceridos":               { metodo: "EN 14105",            unidad: "mg/kg"          },
    "Digliceridos":                 { metodo: "EN 14105",            unidad: "mg/kg"          },
    "Triglicerido":                 { metodo: "EN 14105",            unidad: "mg/kg"          },
    "Glicerol libre":               { metodo: "EN 14105",            unidad: "mg/kg"          },
    "Glicerol total":               { metodo: "EN 14105",            unidad: "mg/kg"          },
    "Estabilidad oxidativa":        { metodo: "EN 14112",            unidad: "Horas"          },
    "Contenido de ester":           { metodo: "EN 14103",            unidad: "% m/m"          },
    "Metil ester acido linolenico": { metodo: "EN 14103",            unidad: "% m/m"          },
    "CSFT":                         { metodo: "ASTM D7501-12a",      unidad: "Segundos"       },
    "Punto de enturbiamiento":      { metodo: "ASTM D2500-16b",      unidad: "°C"             },
    "Viscosidad cinematica 40":     { metodo: "ASTM D445-15a",       unidad: "CST"            },
    "Contaminacion total":          { metodo: "EN 12662",            unidad: "mg/kg"          },
    "Materia Grasa":                { metodo: "IRAM 5503",           unidad: "%"              },
  };

  function param(name) {
    const r = new RegExp('[?&]' + name.replace(/[.*+?^${}()|[\]\\]/g, '\\$&') + '=([^&#]*)');
    const m = r.exec(location.search);
    return m ? decodeURIComponent(m[1].replace(/\+/g, ' ')) : '';
  }

  function set(id, val) {
    const el = document.getElementById(id);
    if (el) el.textContent = val;
  }

  function mkTh(text) {
    const el = document.createElement('th');
    el.textContent = text;
    return el;
  }

  // Parsear especificaciones: "Acidez|< 1;Humedad|< 2000;Glicerol|> 85"
  function parsearEspecificaciones() {
    const raw = param('especificaciones');
    const mapa = {};
    if (!raw || raw === '-') return mapa;
    raw.split(';').forEach(par => {
      const idx = par.indexOf('|');
      if (idx > -1) {
        const det   = normalizar(par.substring(0, idx));
        const espec = par.substring(idx + 1).trim();
        mapa[det] = espec;
      }
    });
    return mapa;
  }

  // Detectar off-spec: soporta "< 1", "> 85", "1.0 - 1.6"
  function esOffSpec(valor, espec) {
    if (isNaN(valor) || !espec) return false;
    espec = espec.trim();
    const toF = s => parseFloat(s.replace(',', '.'));
    const lt  = espec.match(/^<\s*([\d.,]+)/);
    const gt  = espec.match(/^>\s*([\d.,]+)/);
    const rng = espec.match(/^([\d.,]+)\s*[-]+\s*([\d.,]+)/);
    if (lt)  return valor >= toF(lt[1]);
    if (gt)  return valor <= toF(gt[1]);
    if (rng) return valor < toF(rng[1]) || valor > toF(rng[2]);
    return false;
  }

  // Formatear fecha larga de JS a dd/mm/yyyy
  function formatearFecha(raw) {
    if (!raw || raw === '-') return raw;
    const d = new Date(raw);
    if (isNaN(d.getTime())) return raw;
    const dd   = String(d.getDate()).padStart(2, '0');
    const mm   = String(d.getMonth() + 1).padStart(2, '0');
    const yyyy = d.getFullYear();
    return dd + '/' + mm + '/' + yyyy;
  }

  function render() {
    // Datos generales
    set('producto',      param('producto'));
    set('numero',        param('numero'));
    set('fecha',         formatearFecha(param('fecha')));
    set('proveedor',     param('proveedor'));
    set('remito',        param('remito'));
    set('transporte',    param('transporte'));
    set('chofer',        param('chofer'));
    set('dni',           param('dni'));
    set('chasis',        param('chasis'));
    set('motivoReclamo', param('motivoReclamo'));
    set('precintos',     param('precintos'));
    set('observaciones', param('observaciones'));

    // Determinaciones — acepta "determinaciones" o "determinacionesamostrar"
    const detsRaw = param('determinaciones') || param('determinacionesamostrar');
    if (!detsRaw || detsRaw === '-') return;

    // Normalizar nombres (quitar tildes, espacios extra, aliases)
    const dets = detsRaw.split(',').map(d => normalizar(d)).filter(Boolean);

    const specs = parsearEspecificaciones();
    const thead = document.getElementById('thead');
    const tbody = document.getElementById('tbody');

    // Filas de cabecera
    ['METODO', 'ESPECIFICACION', 'UNIDAD'].forEach(label => {
      const tr = document.createElement('tr');
      tr.appendChild(mkTh(label));
      dets.forEach(d => {
        const cat = CATALOGO[d] || {};
        let val = '';
        if (label === 'METODO')         val = cat.metodo || '';
        if (label === 'ESPECIFICACION') val = specs[d]   || '';
        if (label === 'UNIDAD')         val = cat.unidad || '';
        tr.appendChild(mkTh(val));
      });
      thead.appendChild(tr);
    });

    // Fila con nombres de determinaciones
    const trNames = document.createElement('tr');
    trNames.appendChild(mkTh('MUESTRA'));
    dets.forEach(d => trNames.appendChild(mkTh(d.toUpperCase())));
    thead.appendChild(trNames);

    // Filas de resultados
    const muestrasRaw = param('muestras');
    if (!muestrasRaw || muestrasRaw === '-') return;

    // Separador entre muestras: ";" o "," como fallback
    const sepMuestra = muestrasRaw.includes(';') ? ';' : ',';

    muestrasRaw.split(sepMuestra).map(f => f.trim()).filter(Boolean).forEach(fila => {
      const celdas = fila.split('|');
      const tr = document.createElement('tr');

      // Columna numero de muestra
      const tdM = document.createElement('td');
      tdM.textContent = celdas[0] || '';
      tr.appendChild(tdM);

      // Para cada determinacion activa, buscar su posicion en ORDEN_MUESTRAS
      dets.forEach(d => {
        const td  = document.createElement('td');
        const pos = ORDEN_MUESTRAS.indexOf(d);
        const val = (pos > 0 && celdas[pos] !== undefined) ? celdas[pos].trim() : '';
        td.textContent = val;
        if (specs[d] && val !== '' && esOffSpec(parseFloat(val.replace(',', '.')), specs[d])) {
          td.classList.add('off-spec');
        }
        tr.appendChild(td);
      });

      tbody.appendChild(tr);
    });
  }

  document.addEventListener('DOMContentLoaded', render);
</script>
</body>
</html>
