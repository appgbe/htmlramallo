<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Certificado de Análisis - Materias Primas</title>
  <style>
    @page {
      size: A4 portrait;
      margin: 15mm 15mm 15mm 15mm;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: Arial, sans-serif;
      font-size: 10.5px;
      color: #1a1a1a;
      background: #fff;
      width: 210mm;
      margin: 0 auto;
      padding: 15mm;
    }

    /* ── HEADER ── */
    .header {
      display: flex;
      align-items: stretch;
      border: 1.5px solid #1a1a1a;
      margin-bottom: -1px;
    }
    .header-logo {
      padding: 14px 18px;
      border-right: 1.5px solid #1a1a1a;
      display: flex;
      align-items: center;
      justify-content: center;
      min-width: 120px;
    }
    .header-logo img {
      width: 90px;
      height: 90px;
      object-fit: contain;
    }
    .header-title {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 18px 20px;
    }
    .header-title h1 {
      font-size: 16px;
      font-weight: 700;
      letter-spacing: 0.5px;
      line-height: 1.5;
      text-transform: uppercase;
    }

    /* ── TABLA DATOS GENERALES ── */
    .tabla-general {
      width: 100%;
      border-collapse: collapse;
      border: 1.5px solid #1a1a1a;
      margin-bottom: -1px;
    }
    .tabla-general td {
      border: 0.5px solid #c0c0c0;
      padding: 4.5px 10px;
      vertical-align: middle;
    }
    .tabla-general td.label {
      font-weight: 700;
      width: 34%;
      background: #f5f5f5;
      letter-spacing: 0.2px;
    }
    .tabla-general td.valor {
      background: #fff;
    }

    /* ── TABLA ANÁLISIS ── */
    .tabla-analisis {
      width: 100%;
      border-collapse: collapse;
      border: 1.5px solid #1a1a1a;
      margin-bottom: -1px;
    }
    .tabla-analisis th {
      border: 0.5px solid #c0c0c0;
      padding: 5px 7px;
      text-align: center;
      font-weight: 700;
      background: #f5f5f5;
    }
    .tabla-analisis th:first-child {
      text-align: left;
      width: 110px;
      white-space: nowrap;
    }
    .tabla-analisis td {
      border: 0.5px solid #c0c0c0;
      padding: 5px 7px;
      text-align: center;
      background: #fff;
    }
    .tabla-analisis td:first-child {
      text-align: left;
      background: #f5f5f5;
      font-weight: 700;
    }

    /* OFF-SPEC resaltado */
    .off-spec {
      background-color: #fff3cd !important;
      font-weight: 700 !important;
      color: #7d4e00;
    }

    /* ── SECCIÓN INFERIOR ── */
    .tabla-inferior {
      width: 100%;
      border-collapse: collapse;
      border: 1.5px solid #1a1a1a;
      margin-bottom: -1px;
    }
    .tabla-inferior td {
      border: 0.5px solid #c0c0c0;
      padding: 9px 10px;
      vertical-align: top;
    }
    .tabla-inferior td.label {
      width: 130px;
      color: #333;
      background: #fff;
    }
    .tabla-inferior td.valor {
      background: #fff;
      min-height: 24px;
    }

    /* ── FIRMAS ── */
    .footer-firmas {
      width: 100%;
      border-collapse: collapse;
      border: 1.5px solid #1a1a1a;
      border-top: none;
    }
    .footer-firmas td {
      border: 0.5px solid #c0c0c0;
      padding: 22px 10px 10px;
      text-align: center;
      font-size: 9.5px;
      width: 33.33%;
      vertical-align: bottom;
    }
    .firma-rol { font-weight: 700; margin-top: 4px; }

    @media print {
      body { padding: 0; width: 100%; }
      @page { margin: 15mm; }
    }
  </style>
</head>
<body>

  <!-- HEADER -->
  <div class="header">
    <div class="header-logo">
      <img src="https://media.licdn.com/dms/image/v2/C4E0BAQEgKomyV9IoGA/company-logo_200_200/company-logo_200_200/0/1631716602142?e=2147483647&v=beta&t=ZXshAMvNx7akSLYXQVDHM6LgVG8en4IZgVEebaTEZX4" alt="Logo GBE" />
    </div>
    <div class="header-title">
      <h1>Certificado de Análisis<br>Materias Primas</h1>
    </div>
  </div>

  <!-- DATOS GENERALES -->
  <table class="tabla-general">
    <tr><td class="label">PRODUCTO</td><td class="valor" id="producto"></td></tr>
    <tr><td class="label">N° ANÁLISIS</td><td class="valor" id="numero"></td></tr>
    <tr><td class="label">FECHA</td><td class="valor" id="fecha"></td></tr>
    <tr><td class="label">PROCEDENCIA</td><td class="valor" id="proveedor"></td></tr>
    <tr><td class="label">N° DE REMITO</td><td class="valor" id="remito"></td></tr>
    <tr><td class="label">TRANSPORTE</td><td class="valor" id="transporte"></td></tr>
    <tr><td class="label">CHOFER</td><td class="valor" id="chofer"></td></tr>
    <tr><td class="label">DNI</td><td class="valor" id="dni"></td></tr>
    <tr><td class="label">PATENTE (CHASIS)</td><td class="valor" id="chasis"></td></tr>
  </table>

  <!-- TABLA ANÁLISIS -->
  <table class="tabla-analisis">
    <thead id="thead"></thead>
    <tbody id="tbody"></tbody>
  </table>

  <!-- SECCIÓN INFERIOR -->
  <table class="tabla-inferior">
    <tr><td class="label">Motivo de reclamo</td><td class="valor" id="motivoReclamo"></td></tr>
    <tr><td class="label">Precintos cortados</td><td class="valor" id="precintos"></td></tr>
    <tr><td class="label">Observaciones</td><td class="valor" id="observaciones"></td></tr>
  </table>
  <!-- FIRMAS -->
  <table class="footer-firmas">
    <tr>
      <td>
        <div>Elaboró:</div>
        <div class="firma-rol">JEFE DE CALIDAD</div>
      </td>
      <td>
        <div>Aprobó:</div>
        <div class="firma-rol">GERENTE DE PLANTA</div>
      </td>
      <td>Página 1 de 1</td>
    </tr>
  </table>

<script>
  const ORDEN_MUESTRAS = [
    "Muestra","Acidez","Humedad","Sedimentos","Fosforo",
    "Densidad","Concentracion","I. Acidez","Glicerol",
    "MONG","Cenizas","Azufre","Metanol","pH"
  ];

  const ALIAS = {
    "Fósforo":"Fosforo","Fosforo":"Fosforo",
    "Concentración":"Concentracion","Concentracion":"Concentracion",
    "Índice de Acidez":"I. Acidez","Índice de acidez":"I. Acidez",
    "Indice de acidez":"I. Acidez","I. Acidez":"I. Acidez",
    "Triglicérido":"Triglicerido","Triglicerido":"Triglicerido",
    "Monoglicéridos":"Monogliceridos","Monogliceridos":"Monogliceridos",
    "Diglicéridos":"Digliceridos","Digliceridos":"Digliceridos",
    "Índice de Iodo":"Indice de Iodo","Indice de Iodo":"Indice de Iodo",
    "Estabilidad Oxidativa":"Estabilidad oxidativa",
    "Estabilidad oxidativa":"Estabilidad oxidativa",
    "Contenido de Ester":"Contenido de ester",
    "Contenido de ester":"Contenido de ester",
    "Metil ester de acido linolenico":"Metil ester acido linolenico",
    "Cold soak filterability (CSFT)":"CSFT",
    "Viscosidad cinematica a 40C":"Viscosidad cinematica 40",
    "Contaminacion total":"Contaminacion total",
    "Materia grasa":"Materia Grasa",
  };

  const CATALOGO = {
    "Acidez":                       { metodo:"IRAM 5512",          unidad:"g Oleico/100 g"},
    "Humedad":                      { metodo:"IRAM 5510",          unidad:"PPM"           },
    "Sedimentos":                   { metodo:"IRAM 5521",          unidad:"%"             },
    "Fosforo":                      { metodo:"ISO 10540-1",        unidad:"mg/kg"         },
    "Densidad":                     { metodo:"ASTM D4052",         unidad:"g/cm3"         },
    "Concentracion":                { metodo:"",                   unidad:"%"             },
    "I. Acidez":                    { metodo:"ASTM D4928-12",      unidad:"mg/kg"         },
    "Glicerol":                     { metodo:"BS-5711-3 1979",     unidad:"%"             },
    "MONG":                         { metodo:"BS-5711-9/ISO 2464", unidad:"%"             },
    "Cenizas":                      { metodo:"BS-5711 6 1979",     unidad:"%"             },
    "Azufre":                       { metodo:"ASTM 5453",          unidad:"mg/kg"         },
    "Metanol":                      { metodo:"EN 14110",           unidad:"%"             },
    "pH":                           { metodo:"",                   unidad:"N/A"           },
    "Jabones":                      { metodo:"IRAM 5599",          unidad:"mg/kg"         },
    "Centrifugado":                 { metodo:"",                   unidad:"%"             },
    "Indice de Iodo":               { metodo:"",                   unidad:""              },
    "Material insaponificable":     { metodo:"",                   unidad:""              },
    "MIU":                          { metodo:"",                   unidad:""              },
    "Monogliceridos":               { metodo:"EN 14105",           unidad:"mg/kg"         },
    "Digliceridos":                 { metodo:"EN 14105",           unidad:"mg/kg"         },
    "Triglicerido":                 { metodo:"EN 14105",           unidad:"mg/kg"         },
    "Glicerol libre":               { metodo:"EN 14105",           unidad:"mg/kg"         },
    "Glicerol total":               { metodo:"EN 14105",           unidad:"mg/kg"         },
    "Estabilidad oxidativa":        { metodo:"EN 14112",           unidad:"Horas"         },
    "Contenido de ester":           { metodo:"EN 14103",           unidad:"% m/m"         },
    "Metil ester acido linolenico": { metodo:"EN 14103",           unidad:"% m/m"         },
    "CSFT":                         { metodo:"ASTM D7501-12a",     unidad:"Segundos"      },
    "Punto de enturbiamiento":      { metodo:"ASTM D2500-16b",     unidad:"°C"            },
    "Viscosidad cinematica 40":     { metodo:"ASTM D445-15a",      unidad:"CST"           },
    "Contaminacion total":          { metodo:"EN 12662",           unidad:"mg/kg"         },
    "Materia Grasa":                { metodo:"IRAM 5503",          unidad:"%"             },
  };

  function param(name) {
    const r = new RegExp('[?&]' + name.replace(/[.*+?^${}()|[\]\\]/g, '\\$&') + '=([^&#]*)');
    const m = r.exec(location.search);
    return m ? decodeURIComponent(m[1].replace(/\+/g, ' ')) : '';
  }
  function set(id, val) { const el = document.getElementById(id); if (el) el.textContent = val; }
  function mkTh(text) { const el = document.createElement('th'); el.textContent = text; return el; }
  function normalizar(n) { const l = n.trim(); return ALIAS[l] !== undefined ? ALIAS[l] : l; }

  function parsearEspecificaciones() {
    const raw = param('especificaciones');
    const mapa = {};
    if (!raw || raw === '-') return mapa;
    raw.split(';').forEach(par => {
      const idx = par.indexOf('|');
      if (idx > -1) mapa[normalizar(par.substring(0, idx))] = par.substring(idx + 1).trim();
    });
    return mapa;
  }

  function esOffSpec(valor, espec) {
    if (isNaN(valor) || !espec) return false;
    espec = espec.trim();
    const toF = s => parseFloat(s.replace(',', '.'));
    const lt  = espec.match(/^<\s*([\d.,]+)/);
    const gt  = espec.match(/^>\s*([\d.,]+)/);
    const rng = espec.match(/^([\d.,]+)\s*[-]+\s*([\d.,]+)/);
    if (lt)  return valor >= toF(lt[1]);
    if (gt)  return valor <= toF(gt[1]);
    if (rng) return valor < toF(rng[1]) || valor > toF(rng[2]);
    return false;
  }

  function formatearFecha(raw) {
    if (!raw || raw === '-') return raw;
    const d = new Date(raw);
    if (isNaN(d.getTime())) return raw;
    return String(d.getDate()).padStart(2,'0') + '/' +
           String(d.getMonth()+1).padStart(2,'0') + '/' +
           d.getFullYear();
  }

  function render() {
    set('producto',      param('producto'));
    set('numero',        param('numero'));
    set('fecha',         formatearFecha(param('fecha')));
    set('proveedor',     param('proveedor'));
    set('remito',        param('remito'));
    set('transporte',    param('transporte'));
    set('chofer',        param('chofer'));
    set('dni',           param('dni'));
    set('chasis',        param('chasis'));
    set('motivoReclamo', param('motivoReclamo'));
    set('precintos',     param('precintos'));
    set('observaciones', param('observaciones'));

    const detsRaw = param('determinaciones') || param('determinacionesamostrar');
    if (!detsRaw || detsRaw === '-') return;
    const dets  = detsRaw.split(',').map(normalizar).filter(Boolean);
    const specs = parsearEspecificaciones();
    const thead = document.getElementById('thead');
    const tbody = document.getElementById('tbody');

    // Cabeceras MÉTODO / ESPECIFICACIÓN / UNIDAD / MUESTRA
    ['MÉTODO','ESPECIFICACIÓN','UNIDAD'].forEach(label => {
      const tr = document.createElement('tr');
      tr.appendChild(mkTh(label));
      dets.forEach(d => {
        const cat = CATALOGO[d] || {};
        let val = '';
        if (label === 'MÉTODO')         val = cat.metodo || '';
        if (label === 'ESPECIFICACIÓN') val = specs[d]   || '';
        if (label === 'UNIDAD')         val = cat.unidad || '';
        tr.appendChild(mkTh(val));
      });
      thead.appendChild(tr);
    });

    const trNames = document.createElement('tr');
    trNames.appendChild(mkTh('MUESTRA'));
    dets.forEach(d => trNames.appendChild(mkTh(d.toUpperCase())));
    thead.appendChild(trNames);

    // Filas de resultados
    const muestrasRaw = param('muestras');
    if (!muestrasRaw || muestrasRaw === '-') return;
    const sep = muestrasRaw.includes(';') ? ';' : ',';

    muestrasRaw.split(sep).map(f => f.trim()).filter(Boolean).forEach(fila => {
      const celdas = fila.split('|');
      const tr = document.createElement('tr');
      const tdM = document.createElement('td');
      tdM.textContent = celdas[0] || '';
      tr.appendChild(tdM);
      dets.forEach(d => {
        const td  = document.createElement('td');
        const pos = ORDEN_MUESTRAS.indexOf(d);
        const val = (pos > 0 && celdas[pos] !== undefined) ? celdas[pos].trim() : '';
        td.textContent = val;
        if (specs[d] && val !== '' && esOffSpec(parseFloat(val.replace(',','.')), specs[d]))
          td.classList.add('off-spec');
        tr.appendChild(td);
      });
      tbody.appendChild(tr);
    });

    // Imprimir automáticamente al cargar
    window.print();
  }

  document.addEventListener('DOMContentLoaded', render);
</script>
</body>
</html>
