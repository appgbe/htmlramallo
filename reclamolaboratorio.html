<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Certificado de Análisis - Materias Primas</title>
  <style>
    @page {
      size: A4 portrait;
      margin: 15mm 15mm 15mm 15mm;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: Arial, sans-serif;
      font-size: 11px;
      color: #1a1a1a;
      background: #fff;
      width: 210mm;
      min-height: 297mm;
      margin: 0 auto;
      padding: 15mm;
    }

    /* ── HEADER ── */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      border: 1.5px solid #1a1a1a;
      margin-bottom: 0;
    }

    .header-logo {
      width: 80px;
      padding: 8px 12px;
      border-right: 1.5px solid #1a1a1a;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .header-logo img {
      width: 60px;
      height: 60px;
      object-fit: contain;
    }

    .header-title {
      flex: 1;
      text-align: center;
      padding: 8px 20px;
    }

    .header-title h1 {
      font-size: 15px;
      font-weight: 700;
      letter-spacing: 0.5px;
      line-height: 1.4;
    }

    /* ── TABLA DATOS GENERALES ── */
    .tabla-general {
      width: 100%;
      border-collapse: collapse;
      border: 1.5px solid #1a1a1a;
      border-top: none;
      margin-bottom: 0;
    }

    .tabla-general tr td {
      border: 0.5px solid #1a1a1a;
      padding: 5px 10px;
    }

    .tabla-general tr td:first-child {
      font-weight: 700;
      width: 38%;
      background: #f5f5f5;
    }

    /* ── TABLA MÉTODOS Y RESULTADOS ── */
    .tabla-analisis {
      width: 100%;
      border-collapse: collapse;
      border: 1.5px solid #1a1a1a;
      border-top: none;
      margin-bottom: 0;
    }

    .tabla-analisis th,
    .tabla-analisis td {
      border: 0.5px solid #1a1a1a;
      padding: 5px 8px;
      text-align: center;
    }

    .tabla-analisis th:first-child,
    .tabla-analisis td:first-child {
      text-align: left;
      background: #f5f5f5;
      font-weight: 700;
      width: 110px;
    }

    .tabla-analisis thead th {
      background: #f5f5f5;
      font-weight: 700;
    }

    .tabla-analisis tbody td {
      font-weight: 400;
      background: #fff;
    }

    .tabla-analisis tbody td:first-child {
      background: #f5f5f5;
    }

    /* ── OFF-SPEC ── */
    .off-spec {
      background-color: #fff3cd !important;
      font-weight: 700 !important;
      color: #7d4e00;
    }

    /* ── SECCIÓN RECLAMO ── */
    .tabla-inferior {
      width: 100%;
      border-collapse: collapse;
      border: 1.5px solid #1a1a1a;
      border-top: none;
      margin-bottom: 0;
    }

    .tabla-inferior td {
      border: 0.5px solid #1a1a1a;
      padding: 7px 10px;
      vertical-align: top;
    }

    .tabla-inferior td:first-child {
      width: 130px;
      font-weight: 400;
      color: #1a1a1a;
      background: #fff;
    }

    .tabla-inferior td:last-child {
      background: #fff;
      min-height: 30px;
    }

    /* ── NOTA ── */
    .nota {
      border: 1.5px solid #1a1a1a;
      border-top: none;
      padding: 7px 10px;
      font-style: italic;
      text-align: center;
      font-size: 10px;
    }

    /* ── FOOTER FIRMAS ── */
    .footer-firmas {
      display: flex;
      border: 1.5px solid #1a1a1a;
      border-top: none;
    }

    .firma {
      flex: 1;
      text-align: center;
      padding: 18px 10px 8px;
      font-size: 10px;
      border-right: 0.5px solid #1a1a1a;
    }

    .firma:last-child {
      border-right: none;
    }

    .firma-rol {
      font-weight: 700;
      margin-top: 4px;
    }

    .pagina {
      flex: 0.6;
      text-align: center;
      padding: 18px 10px 8px;
      font-size: 10px;
      font-weight: 700;
    }

    /* ── PRINT ── */
    @media print {
      body {
        padding: 0;
        width: 100%;
      }

      .no-print {
        display: none;
      }
    }

    /* ── BOTÓN IMPRIMIR ── */
    .btn-print {
      display: block;
      margin: 16px auto;
      padding: 10px 28px;
      background: #2d5016;
      color: white;
      border: none;
      border-radius: 4px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      letter-spacing: 0.5px;
    }

    .btn-print:hover {
      background: #3d6b1e;
    }

    @media print {
      .btn-print { display: none; }
    }
  </style>
</head>
<body>

  <button class="btn-print no-print" onclick="window.print()">🖨️ Imprimir / Guardar PDF</button>

  <!-- HEADER -->
  <div class="header">
    <div class="header-logo">
      <img src="https://media.licdn.com/dms/image/v2/C4E0BAQEgKomyV9IoGA/company-logo_200_200/company-logo_200_200/0/1631716602142?e=2147483647&v=beta&t=ZXshAMvNx7akSLYXQVDHM6LgVG8en4IZgVEebaTEZX4" alt="Logo GBE" />
    </div>
    <div class="header-title">
      <h1>CERTIFICADO DE ANÁLISIS<br>MATERIAS PRIMAS</h1>
    </div>
  </div>

  <!-- DATOS GENERALES -->
  <table class="tabla-general">
    <tr>
      <td><strong>PRODUCTO</strong></td>
      <td id="producto"></td>
    </tr>
    <tr>
      <td><strong>N° ANÁLISIS</strong></td>
      <td id="numero"></td>
    </tr>
    <tr>
      <td><strong>FECHA</strong></td>
      <td id="fecha"></td>
    </tr>
    <tr>
      <td><strong>PROCEDENCIA</strong></td>
      <td id="proveedor"></td>
    </tr>
    <tr>
      <td><strong>N° DE REMITO</strong></td>
      <td id="remito"></td>
    </tr>
    <tr>
      <td><strong>TRANSPORTE</strong></td>
      <td id="transporte"></td>
    </tr>
    <tr>
      <td><strong>CHOFER</strong></td>
      <td id="chofer"></td>
    </tr>
    <tr>
      <td><strong>DNI</strong></td>
      <td id="dni"></td>
    </tr>
    <tr>
      <td><strong>PATENTE (CHASIS)</strong></td>
      <td id="chasis"></td>
    </tr>
  </table>

  <!-- TABLA MÉTODOS + RESULTADOS -->
  <table class="tabla-analisis" id="tablaAnalisis">
    <thead id="theadAnalisis"></thead>
    <tbody id="tbodyAnalisis"></tbody>
  </table>

  <!-- RECLAMO Y OBSERVACIONES -->
  <table class="tabla-inferior">
    <tr>
      <td>Motivo de reclamo</td>
      <td id="motivoReclamo"></td>
    </tr>
    <tr>
      <td>Precintos cortados</td>
      <td id="precintos"></td>
    </tr>
    <tr>
      <td>Observaciones</td>
      <td id="observaciones"></td>
    </tr>
  </table>

  <!-- NOTA -->
  <div class="nota">
    <em>El muestreo es realizado según Norma IRAM 5502</em>
  </div>

  <!-- FIRMAS -->
  <div class="footer-firmas">
    <div class="firma">
      <div>Elaboró:</div>
      <div class="firma-rol">JEFE DE CALIDAD</div>
    </div>
    <div class="firma">
      <div>Aprobó:</div>
      <div class="firma-rol">GERENTE DE PLANTA</div>
    </div>
    <div class="pagina">Página 1 de 1</div>
  </div>

<script>
  // ── UTILIDADES ──────────────────────────────────────────────
  function param(name) {
    const r = new RegExp('[?&]' + name.replace(/[.*+?^${}()|[\]\\]/g, '\\$&') + '=([^&#]*)');
    const m = r.exec(location.search);
    return m ? decodeURIComponent(m[1].replace(/\+/g, ' ')) : '';
  }

  function set(id, val) {
    const el = document.getElementById(id);
    if (el) el.textContent = val;
  }

  // ── DATOS GENERALES ─────────────────────────────────────────
  function cargarGeneral() {
    set('producto',      param('producto'));
    set('numero',        param('numero'));
    set('fecha',         param('fecha'));
    set('proveedor',     param('proveedor'));
    set('remito',        param('remito'));
    set('transporte',    param('transporte'));
    set('chofer',        param('chofer'));
    set('dni',           param('dni'));
    set('chasis',        param('chasis'));
    set('motivoReclamo', param('motivoReclamo'));
    set('precintos',     param('precintos'));
    set('observaciones', param('observaciones') || '');
  }

  // ── TABLA DE MÉTODOS Y RESULTADOS ───────────────────────────
  // URL espera:
  //   determinaciones = "ACIDEZ,HUMEDAD,SEDIMENTOS"
  //   metodo_ACIDEZ   = "IRAM 5512"
  //   espec_ACIDEZ    = "< 1"
  //   unidad_ACIDEZ   = "%"
  //   muestras        = "1|0.35|747|0.00, 2|0.40|800|0.01"  (pipe=cols, coma=filas)

  function cargarTabla() {
    const detsRaw = param('determinaciones');
    if (!detsRaw) return;

    const dets = detsRaw.split(',').map(d => d.trim()).filter(Boolean);

    const thead = document.getElementById('theadAnalisis');
    const tbody = document.getElementById('tbodyAnalisis');

    // ── Fila MÉTODO
    const trMetodo = document.createElement('tr');
    trMetodo.appendChild(th('MÉTODO'));
    dets.forEach(d => trMetodo.appendChild(th(param('metodo_' + d) || '')));
    thead.appendChild(trMetodo);

    // ── Fila ESPECIFICACIÓN
    const trEspec = document.createElement('tr');
    trEspec.appendChild(th('ESPECIFICACIÓN'));
    dets.forEach(d => trEspec.appendChild(th(param('espec_' + d) || '')));
    thead.appendChild(trEspec);

    // ── Fila UNIDAD
    const trUnidad = document.createElement('tr');
    trUnidad.appendChild(th('UNIDAD'));
    dets.forEach(d => trUnidad.appendChild(th(param('unidad_' + d) || '')));
    thead.appendChild(trUnidad);

    // ── Fila MUESTRA (header)
    const trHeader = document.createElement('tr');
    trHeader.appendChild(th('MUESTRA'));
    dets.forEach(d => trHeader.appendChild(th(d)));
    thead.appendChild(trHeader);

    // ── Filas de resultados
    const muestrasRaw = param('muestras');
    if (!muestrasRaw) return;

    const filas = muestrasRaw.split(',').map(f => f.trim()).filter(Boolean);
    filas.forEach(fila => {
      const celdas = fila.split('|');
      const tr = document.createElement('tr');

      // Primera celda: número de muestra
      const tdMuestra = document.createElement('td');
      tdMuestra.textContent = celdas[0] || '';
      tr.appendChild(tdMuestra);

      // Resto: valores de cada determinación
      dets.forEach((d, i) => {
        const td = document.createElement('td');
        const valor = celdas[i + 1] !== undefined ? celdas[i + 1].trim() : '';
        td.textContent = valor;

        // Resaltar off-spec comparando con especificación
        const especRaw = param('espec_' + d);
        if (especRaw && valor !== '') {
          if (esOffSpec(parseFloat(valor), especRaw)) {
            td.classList.add('off-spec');
          }
        }

        tr.appendChild(td);
      });

      tbody.appendChild(tr);
    });
  }

  function th(text) {
    const el = document.createElement('th');
    el.textContent = text;
    return el;
  }

  // ── DETECTAR OFF-SPEC ────────────────────────────────────────
  // Soporta: "< 1", "> 99.7", "< 0.15", "1 - 1.6"
  function esOffSpec(valor, espec) {
    if (isNaN(valor)) return false;
    espec = espec.trim();

    const menorQ = espec.match(/^<\s*([\d.,]+)/);
    const mayorQ = espec.match(/^>\s*([\d.,]+)/);
    const rango  = espec.match(/^([\d.,]+)\s*[-–]\s*([\d.,]+)/);

    if (menorQ) return valor >= parseFloat(menorQ[1].replace(',', '.'));
    if (mayorQ) return valor <= parseFloat(mayorQ[1].replace(',', '.'));
    if (rango)  return valor < parseFloat(rango[1].replace(',', '.')) || valor > parseFloat(rango[2].replace(',', '.'));
    return false;
  }

  // ── INIT ────────────────────────────────────────────────────
  document.addEventListener('DOMContentLoaded', () => {
    cargarGeneral();
    cargarTabla();
  });
</script>
</body>
</html>
