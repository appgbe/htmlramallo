<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Certificado de Análisis - Materias Primas</title>
  <style>
    @page { size: A4 portrait; margin: 12mm; }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: Arial, sans-serif;
      font-size: 11px;
      color: #1a1a1a;
      background: #fff;
      width: 210mm;
      min-height: 297mm;
      margin: 0 auto;
      padding: 12mm;
    }
    .header {
      display: flex;
      align-items: stretch;
      border: 1.5px solid #1a1a1a;
    }
    .header-logo {
      padding: 8px 12px;
      border-right: 1.5px solid #1a1a1a;
      display: flex;
      align-items: center;
      justify-content: center;
      min-width: 80px;
    }
    .header-logo img {
      width: 58px; height: 58px;
      object-fit: contain;
    }
    .header-title {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 10px 20px;
    }
    .header-title h1 { font-size: 14px; font-weight: 700; line-height: 1.5; }
    .tabla-general {
      width: 100%;
      border-collapse: collapse;
      border: 1.5px solid #1a1a1a;
      border-top: none;
    }
    .tabla-general td { border: 0.5px solid #1a1a1a; padding: 4px 8px; }
    .tabla-general td.label { font-weight: 700; width: 36%; background: #f2f2f2; }
    .tabla-analisis {
      width: 100%;
      border-collapse: collapse;
      border: 1.5px solid #1a1a1a;
      border-top: none;
    }
    .tabla-analisis th, .tabla-analisis td {
      border: 0.5px solid #1a1a1a;
      padding: 4px 6px;
      text-align: center;
    }
    .tabla-analisis th:first-child, .tabla-analisis td:first-child {
      text-align: left;
      background: #f2f2f2;
      font-weight: 700;
      width: 105px;
      white-space: nowrap;
    }
    .tabla-analisis thead th { background: #f2f2f2; font-weight: 700; }
    .tabla-analisis tbody td { background: #fff; }
    .tabla-analisis tbody td:first-child { background: #f2f2f2; }
    .off-spec { background-color: #fff3cd !important; font-weight: 700 !important; color: #7d4e00; }
    .tabla-inferior {
      width: 100%;
      border-collapse: collapse;
      border: 1.5px solid #1a1a1a;
      border-top: none;
    }
    .tabla-inferior td { border: 0.5px solid #1a1a1a; padding: 6px 8px; vertical-align: top; }
    .tabla-inferior td.label { width: 120px; background: #fff; }
    .nota {
      border: 1.5px solid #1a1a1a;
      border-top: none;
      padding: 6px 10px;
      font-style: italic;
      text-align: center;
      font-size: 10px;
    }
    .footer-firmas {
      display: flex;
      border: 1.5px solid #1a1a1a;
      border-top: none;
    }
    .firma {
      flex: 1;
      text-align: center;
      padding: 20px 10px 8px;
      font-size: 10px;
      border-right: 0.5px solid #1a1a1a;
    }
    .firma:last-child { border-right: none; }
    .firma-rol { font-weight: 700; margin-top: 3px; }
    .pagina {
      flex: 0.5;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 10px;
      font-weight: 700;
    }
    .btn-print {
      display: block;
      margin: 14px auto;
      padding: 9px 26px;
      background: #2d5016;
      color: white;
      border: none;
      border-radius: 4px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
    }
    .btn-print:hover { background: #3d6b1e; }
    @media print {
      body { padding: 0; width: 100%; }
      .no-print { display: none; }
    }
  </style>
</head>
<body>

  <button class="btn-print no-print" onclick="window.print()">🖨️ Imprimir / Guardar PDF</button>

  <div class="header">
    <div class="header-logo">
      <img src="https://media.licdn.com/dms/image/v2/C4E0BAQEgKomyV9IoGA/company-logo_200_200/company-logo_200_200/0/1631716602142?e=2147483647&v=beta&t=ZXshAMvNx7akSLYXQVDHM6LgVG8en4IZgVEebaTEZX4" alt="Logo GBE" />
    </div>
    <div class="header-title">
      <h1>CERTIFICADO DE ANÁLISIS<br>MATERIAS PRIMAS</h1>
    </div>
  </div>

  <table class="tabla-general">
    <tr><td class="label">PRODUCTO</td><td id="producto"></td></tr>
    <tr><td class="label">N° ANÁLISIS</td><td id="numero"></td></tr>
    <tr><td class="label">FECHA</td><td id="fecha"></td></tr>
    <tr><td class="label">PROCEDENCIA</td><td id="proveedor"></td></tr>
    <tr><td class="label">N° DE REMITO</td><td id="remito"></td></tr>
    <tr><td class="label">TRANSPORTE</td><td id="transporte"></td></tr>
    <tr><td class="label">CHOFER</td><td id="chofer"></td></tr>
    <tr><td class="label">DNI</td><td id="dni"></td></tr>
    <tr><td class="label">PATENTE (CHASIS)</td><td id="chasis"></td></tr>
  </table>

  <table class="tabla-analisis">
    <thead id="thead"></thead>
    <tbody id="tbody"></tbody>
  </table>

  <table class="tabla-inferior">
    <tr><td class="label">Motivo de reclamo</td><td id="motivoReclamo"></td></tr>
    <tr><td class="label">Precintos cortados</td><td id="precintos"></td></tr>
    <tr><td class="label">Observaciones</td><td id="observaciones"></td></tr>
  </table>

  <div class="nota"><em>El muestreo es realizado según Norma IRAM 5502</em></div>

  <div class="footer-firmas">
    <div class="firma"><div>Elaboró:</div><div class="firma-rol">JEFE DE CALIDAD</div></div>
    <div class="firma"><div>Aprobó:</div><div class="firma-rol">GERENTE DE PLANTA</div></div>
    <div class="pagina">Página 1 de 1</div>
  </div>

<script>
  // ── CATÁLOGO: método y unidad por determinación ──────────────
  const CATALOGO = {
    "Acidez":                       { metodo: "IRAM 5512",           unidad: "g Oleico/100 g" },
    "Humedad":                      { metodo: "IRAM 5510",           unidad: "%"              },
    "Sedimentos":                   { metodo: "IRAM 5521",           unidad: "%"              },
    "Fosforo":                      { metodo: "ISO 10540-1",         unidad: "mg/kg"          },
    "Densidad":                     { metodo: "ASTM D4052",          unidad: "g/cm3"          },
    "Concentracion":                { metodo: "",                    unidad: "%"              },
    "I. Acidez":                    { metodo: "ASTM D4928-12",       unidad: "mg/kg"          },
    "Glicerol":                     { metodo: "BS-5711-3 1979",      unidad: "%"              },
    "MONG":                         { metodo: "BS-5711-9/ISO 2464",  unidad: "%"              },
    "Cenizas":                      { metodo: "BS-5711 6 1979",      unidad: "%"              },
    "Azufre":                       { metodo: "ASTM 5453",           unidad: "mg/kg"          },
    "Metanol":                      { metodo: "EN 14110",            unidad: "%"              },
    "pH":                           { metodo: "",                    unidad: "N/A"            },
    "Jabones":                      { metodo: "IRAM 5599",           unidad: "mg/kg"          },
    "Centrifugado":                 { metodo: "",                    unidad: "%"              },
    "Indice de Iodo":               { metodo: "",                    unidad: ""               },
    "Material insaponificable":     { metodo: "",                    unidad: ""               },
    "MIU":                          { metodo: "",                    unidad: ""               },
    "Monogliceridos":               { metodo: "EN 14105",            unidad: "mg/kg"          },
    "Digliceridos":                 { metodo: "EN 14105",            unidad: "mg/kg"          },
    "Triglicerido":                 { metodo: "EN 14105",            unidad: "mg/kg"          },
    "Glicerol libre":               { metodo: "EN 14105",            unidad: "mg/kg"          },
    "Glicerol total":               { metodo: "EN 14105",            unidad: "mg/kg"          },
    "Estabilidad oxidativa":        { metodo: "EN 14112",            unidad: "Horas"          },
    "Contenido de ester":           { metodo: "EN 14103",            unidad: "% m/m"          },
    "Metil ester acido linolenico": { metodo: "EN 14103",            unidad: "% m/m"          },
    "CSFT":                         { metodo: "ASTM D7501-12a",      unidad: "Segundos"       },
    "Punto de enturbiamiento":      { metodo: "ASTM D2500-16b",      unidad: "°C"             },
    "Viscosidad cinematica 40":     { metodo: "ASTM D445-15a",       unidad: "CST"            },
    "Contaminacion total":          { metodo: "EN 12662",            unidad: "mg/kg"          },
    "Materia Grasa":                { metodo: "IRAM 5503",           unidad: "%"              },
  };

  // ── UTILIDADES ───────────────────────────────────────────────
  function param(name) {
    const r = new RegExp('[?&]' + name.replace(/[.*+?^${}()|[\]\\]/g, '\\$&') + '=([^&#]*)');
    const m = r.exec(location.search);
    return m ? decodeURIComponent(m[1].replace(/\+/g, ' ')) : '';
  }

  function set(id, val) {
    const el = document.getElementById(id);
    if (el) el.textContent = val;
  }

  function mkTh(text) {
    const el = document.createElement('th');
    el.textContent = text;
    return el;
  }

  // ── PARSEAR &especificaciones= ────────────────────────────────
  // Formato: "Acidez|< 1;Humedad|< 2000;Sedimentos|< 0.15"
  function parsearEspecificaciones() {
    const raw = param('especificaciones');
    const mapa = {};
    if (!raw || raw === '-') return mapa;
    raw.split(';').forEach(par => {
      const [det, espec] = par.split('|');
      if (det && espec !== undefined) mapa[det.trim()] = espec.trim();
    });
    return mapa;
  }

  // ── DETECTAR OFF-SPEC ─────────────────────────────────────────
  function esOffSpec(valor, espec) {
    if (isNaN(valor) || !espec) return false;
    espec = espec.trim();
    const lt  = espec.match(/^<\s*([\d.,]+)/);
    const gt  = espec.match(/^>\s*([\d.,]+)/);
    const rng = espec.match(/^([\d.,]+)\s*[-–]\s*([\d.,]+)/);
    const toF = s => parseFloat(s.replace(',', '.'));
    if (lt)  return valor >= toF(lt[1]);
    if (gt)  return valor <= toF(gt[1]);
    if (rng) return valor < toF(rng[1]) || valor > toF(rng[2]);
    return false;
  }

  // ── RENDER ────────────────────────────────────────────────────
  function render() {
    // Datos generales
    set('producto',      param('producto'));
    set('numero',        param('numero'));
    set('fecha',         param('fecha'));
    set('proveedor',     param('proveedor'));
    set('remito',        param('remito'));
    set('transporte',    param('transporte'));
    set('chofer',        param('chofer'));
    set('dni',           param('dni'));
    set('chasis',        param('chasis'));
    set('motivoReclamo', param('motivoReclamo'));
    set('precintos',     param('precintos'));
    set('observaciones', param('observaciones'));

    // Determinaciones y especificaciones
    const detsRaw = param('determinaciones');
    if (!detsRaw || detsRaw === '-') return;

    const dets  = detsRaw.split(',').map(d => d.trim()).filter(Boolean);
    const specs = parsearEspecificaciones();

    const thead = document.getElementById('thead');
    const tbody = document.getElementById('tbody');

    // Cabeceras: MÉTODO, ESPECIFICACIÓN, UNIDAD
    ['MÉTODO', 'ESPECIFICACIÓN', 'UNIDAD'].forEach(label => {
      const tr = document.createElement('tr');
      tr.appendChild(mkTh(label));
      dets.forEach(d => {
        const cat = CATALOGO[d] || {};
        let val = '';
        if (label === 'MÉTODO')         val = cat.metodo  || '';
        if (label === 'ESPECIFICACIÓN') val = specs[d]    || '';
        if (label === 'UNIDAD')         val = cat.unidad  || '';
        tr.appendChild(mkTh(val));
      });
      thead.appendChild(tr);
    });

    // Fila con nombres de determinaciones
    const trNames = document.createElement('tr');
    trNames.appendChild(mkTh('MUESTRA'));
    dets.forEach(d => trNames.appendChild(mkTh(d.toUpperCase())));
    thead.appendChild(trNames);

    // Filas de resultados
    // Formato muestras: "CIST1|0.35|747|0.00;CIST2|0.38|820|0.01"
    const muestrasRaw = param('muestras');
    if (!muestrasRaw || muestrasRaw === '-') return;

    muestrasRaw.split(';').map(f => f.trim()).filter(Boolean).forEach(fila => {
      const celdas = fila.split('|');
      const tr = document.createElement('tr');

      const tdM = document.createElement('td');
      tdM.textContent = celdas[0] || '';
      tr.appendChild(tdM);

      dets.forEach((d, i) => {
        const td  = document.createElement('td');
        const val = (celdas[i + 1] || '').trim();
        td.textContent = val;
        if (specs[d] && val !== '' && esOffSpec(parseFloat(val.replace(',', '.')), specs[d])) {
          td.classList.add('off-spec');
        }
        tr.appendChild(td);
      });

      tbody.appendChild(tr);
    });
  }

  document.addEventListener('DOMContentLoaded', render);
</script>
</body>
</html>v
