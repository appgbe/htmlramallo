<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Certificado de Análisis - Materias Primas</title>
  <style>
    @page { size: A4 portrait; margin: 12mm 14mm; }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --verde:      #2d5c1e;
      --verde-med:  #4a8c2a;
      --verde-claro:#eaf3de;
      --dorado:     #e09a1a;
      --gris-claro: #f2f2f0;
      --gris-borde: #c0c0bc;
      --texto:      #1a1a1a;
      --texto-sec:  #555550;
    }

    html, body {
      width: 210mm;
      margin: 0 auto;
      font-family: Arial, sans-serif;
      font-size: 10.5px;
      color: var(--texto);
      background: #fff;
    }

    /* Forzar colores en impresión */
    * {
      -webkit-print-color-adjust: exact !important;
      print-color-adjust: exact !important;
      color-adjust: exact !important;
    }

    /* Layout principal: flex column ocupa toda la página */
    .pagina {
      min-height: 267mm; /* 297mm - 12mm*2 márgenes */
      display: flex;
      flex-direction: column;
      padding: 0;
    }

    .contenido {
      flex: 1;
    }

    /* ── ENCABEZADO ── */
    .encabezado {
      display: flex;
      align-items: stretch;
      border: 1.5px solid var(--gris-borde);
      margin-bottom: 10px;
    }
    .enc-logo {
      background: #fff;
      padding: 10px 14px;
      border-right: 1.5px solid var(--gris-borde);
      display: flex;
      align-items: center;
      justify-content: center;
      min-width: 110px;
    }
    .enc-logo img {
      width: 80px;
      height: 80px;
      object-fit: contain;
    }
    .enc-titulo {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 14px 20px;
      background: #fff;
    }
    .enc-titulo h1 {
      font-size: 16px;
      font-weight: 700;
      color: #1a1a1a;
      letter-spacing: 1px;
      text-transform: uppercase;
      text-align: center;
      line-height: 1.6;
    }

    /* ── DATOS DEL INGRESO ── */
    .seccion-camion {
      margin-bottom: 10px;
      border: 1.5px solid var(--gris-borde);
      overflow: hidden;
    }
    .seccion-titulo {
      background: var(--verde);
      color: #fff;
      font-size: 9.5px;
      font-weight: 700;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      padding: 5px 12px;
    }
    .datos-grid {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 10px 24px;
      background: var(--gris-claro);
      padding: 12px 14px;
    }
    .dato-item {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }
    .dato-label {
      font-size: 8px;
      font-weight: 700;
      color: var(--verde);
      letter-spacing: 1px;
      text-transform: uppercase;
    }
    .dato-valor {
      font-size: 12px;
      font-weight: 600;
      color: var(--texto);
      border-bottom: 1px solid var(--gris-borde);
      padding-bottom: 3px;
    }

    /* ── TABLA ANÁLISIS ── */
    .seccion-analisis {
      margin-bottom: 10px;
      border: 1.5px solid var(--gris-borde);
      overflow: hidden;
    }
    .tabla-analisis {
      width: 100%;
      border-collapse: collapse;
    }
    .tabla-analisis thead th {
      background: var(--verde-claro);
      border: 0.5px solid var(--gris-borde);
      padding: 5px 7px;
      text-align: center;
      font-weight: 700;
      font-size: 10px;
      color: var(--verde);
    }
    .tabla-analisis thead th:first-child {
      text-align: left;
      width: 110px;
      background: var(--verde);
      color: #fff;
    }
    .tabla-analisis tbody td {
      border: 0.5px solid var(--gris-borde);
      padding: 5px 7px;
      text-align: center;
      background: #fff;
      font-size: 10.5px;
    }
    .tabla-analisis tbody td:first-child {
      text-align: left;
      background: var(--gris-claro);
      font-weight: 700;
      color: var(--texto-sec);
      font-size: 10px;
    }
    .fila-nombres th {
      background: var(--verde) !important;
      color: #fff !important;
      font-size: 9.5px !important;
      letter-spacing: 0.3px;
    }
    .fila-nombres th:first-child {
      background: var(--verde) !important;
      color: #fff !important;
    }
    .off-spec {
      background-color: #fff3cd !important;
      font-weight: 700 !important;
      color: #7d4e00 !important;
    }

    /* ── SEPARADOR ── */
    .separador {
      height: 3px;
      background: var(--dorado);
      margin: 0 0 10px 0;
    }

    /* ── RECLAMO ── */
    .seccion-reclamo {
      margin-bottom: 10px;
      border: 1.5px solid var(--gris-borde);
      overflow: hidden;
    }
    .tabla-reclamo {
      width: 100%;
      border-collapse: collapse;
    }
    .tabla-reclamo td {
      border: 0.5px solid var(--gris-borde);
      padding: 7px 10px;
      vertical-align: top;
    }
    .tabla-reclamo td.label {
      width: 130px;
      font-size: 8px;
      font-weight: 700;
      color: var(--verde);
      letter-spacing: 0.8px;
      text-transform: uppercase;
      background: var(--gris-claro);
    }
    .tabla-reclamo td.valor {
      background: #fff;
      font-size: 10.5px;
      min-height: 22px;
    }

    /* ── FOOTER — siempre al pie ── */
    .footer-firmas {
      width: 100%;
      border-collapse: collapse;
      border: 1.5px solid var(--gris-borde);
      margin-top: auto;
    }
    .footer-firmas td {
      border: 0.5px solid var(--gris-borde);
      padding: 20px 10px 10px;
      text-align: center;
      font-size: 9.5px;
      width: 33.33%;
      vertical-align: bottom;
      background: #fff;
    }
    .firma-linea {
      border-top: 1px solid var(--texto);
      width: 70%;
      margin: 0 auto 6px;
    }
    .firma-tipo {
      font-size: 8.5px;
      color: var(--texto-sec);
      margin-bottom: 6px;
    }
    .firma-rol {
      font-weight: 700;
      font-size: 9px;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      color: #1a1a1a;
      margin-top: 3px;
    }
    .pagina-text {
      font-weight: 700;
      font-size: 10px;
      color: #1a1a1a;
    }

    @media print {
      html, body { width: 100%; }
      .pagina { min-height: 267mm; }
      @page { margin: 12mm 14mm; }
    }
  </style>
</head>
<body>
<div class="pagina">

  <div class="contenido">

    <!-- ENCABEZADO -->
    <div class="encabezado">
      <div class="enc-logo">
        <img src="https://media.licdn.com/dms/image/v2/C4E0BAQEgKomyV9IoGA/company-logo_200_200/company-logo_200_200/0/1631716602142?e=2147483647&v=beta&t=ZXshAMvNx7akSLYXQVDHM6LgVG8en4IZgVEebaTEZX4" alt="Logo GBE" />
      </div>
      <div class="enc-titulo">
        <h1>Certificado de Análisis<br>Materias Primas</h1>
      </div>
    </div>

    <!-- DATOS DEL INGRESO -->
    <div class="seccion-camion">
      <div class="seccion-titulo">Información del ingreso</div>
      <div class="datos-grid">
        <div class="dato-item">
          <span class="dato-label">Producto</span>
          <span class="dato-valor" id="producto"></span>
        </div>
        <div class="dato-item">
          <span class="dato-label">N° Análisis</span>
          <span class="dato-valor" id="numero"></span>
        </div>
        <div class="dato-item">
          <span class="dato-label">Fecha</span>
          <span class="dato-valor" id="fecha"></span>
        </div>
        <div class="dato-item">
          <span class="dato-label">Procedencia</span>
          <span class="dato-valor" id="proveedor"></span>
        </div>
        <div class="dato-item">
          <span class="dato-label">N° de Remito</span>
          <span class="dato-valor" id="remito"></span>
        </div>
        <div class="dato-item">
          <span class="dato-label">Transporte</span>
          <span class="dato-valor" id="transporte"></span>
        </div>
        <div class="dato-item">
          <span class="dato-label">Chofer</span>
          <span class="dato-valor" id="chofer"></span>
        </div>
        <div class="dato-item">
          <span class="dato-label">DNI</span>
          <span class="dato-valor" id="dni"></span>
        </div>
        <div class="dato-item">
          <span class="dato-label">Patente (Chasis)</span>
          <span class="dato-valor" id="chasis"></span>
        </div>
      </div>
    </div>

    <!-- TABLA ANÁLISIS -->
    <div class="seccion-analisis">
      <table class="tabla-analisis">
        <thead id="thead"></thead>
        <tbody id="tbody"></tbody>
      </table>
    </div>

    <!-- SEPARADOR -->
    <div class="separador"></div>

    <!-- RECLAMO -->
    <div class="seccion-reclamo">
      <table class="tabla-reclamo">
        <tr>
          <td class="label">Motivo de reclamo</td>
          <td class="valor" id="motivoReclamo"></td>
        </tr>
        <tr>
          <td class="label">Precintos cortados</td>
          <td class="valor" id="precintos"></td>
        </tr>
        <tr>
          <td class="label">Observaciones</td>
          <td class="valor" id="observaciones"></td>
        </tr>
      </table>
    </div>

  </div><!-- fin .contenido -->

  <!-- FOOTER SIEMPRE AL FINAL -->
  <table class="footer-firmas">
    <tr>
      <td>
        <div class="firma-tipo">Elaboró:</div>
        <div class="firma-linea"></div>
        <div class="firma-rol">Jefe de Calidad</div>
      </td>
      <td>
        <div class="firma-tipo">Aprobó:</div>
        <div class="firma-linea"></div>
        <div class="firma-rol">Gerente de Planta</div>
      </td>
      <td>
        <div class="pagina-text">Página 1 de 1</div>
      </td>
    </tr>
  </table>

</div><!-- fin .pagina -->

<script>
  const ORDEN_MUESTRAS = [
    "Muestra","Acidez","Humedad","Sedimentos","Fosforo",
    "Densidad","Concentracion","I. Acidez","Glicerol",
    "MONG","Cenizas","Azufre","Metanol","pH"
  ];

  const ALIAS = {
    "Fósforo":"Fosforo","Fosforo":"Fosforo",
    "Concentración":"Concentracion","Concentracion":"Concentracion",
    "Índice de Acidez":"I. Acidez","Índice de acidez":"I. Acidez",
    "Indice de acidez":"I. Acidez","I. Acidez":"I. Acidez",
    "Triglicérido":"Triglicerido","Triglicerido":"Triglicerido",
    "Monoglicéridos":"Monogliceridos","Monogliceridos":"Monogliceridos",
    "Diglicéridos":"Digliceridos","Digliceridos":"Digliceridos",
    "Índice de Iodo":"Indice de Iodo","Indice de Iodo":"Indice de Iodo",
    "Estabilidad Oxidativa":"Estabilidad oxidativa",
    "Estabilidad oxidativa":"Estabilidad oxidativa",
    "Contenido de Ester":"Contenido de ester",
    "Contenido de ester":"Contenido de ester",
    "Metil ester de acido linolenico":"Metil ester acido linolenico",
    "Cold soak filterability (CSFT)":"CSFT",
    "Viscosidad cinematica a 40C":"Viscosidad cinematica 40",
    "Contaminacion total":"Contaminacion total",
    "Materia grasa":"Materia Grasa",
  };

  const CATALOGO = {
    "Acidez":                       { metodo:"IRAM 5512",          unidad:"g Oleico/100 g"},
    "Humedad":                      { metodo:"IRAM 5510",          unidad:"PPM"           },
    "Sedimentos":                   { metodo:"IRAM 5521",          unidad:"%"             },
    "Fosforo":                      { metodo:"ISO 10540-1",        unidad:"mg/kg"         },
    "Densidad":                     { metodo:"ASTM D4052",         unidad:"g/cm3"         },
    "Concentracion":                { metodo:"",                   unidad:"%"             },
    "I. Acidez":                    { metodo:"ASTM D4928-12",      unidad:"mg/kg"         },
    "Glicerol":                     { metodo:"BS-5711-3 1979",     unidad:"%"             },
    "MONG":                         { metodo:"BS-5711-9/ISO 2464", unidad:"%"             },
    "Cenizas":                      { metodo:"BS-5711 6 1979",     unidad:"%"             },
    "Azufre":                       { metodo:"ASTM 5453",          unidad:"mg/kg"         },
    "Metanol":                      { metodo:"EN 14110",           unidad:"%"             },
    "pH":                           { metodo:"",                   unidad:"N/A"           },
    "Jabones":                      { metodo:"IRAM 5599",          unidad:"mg/kg"         },
    "Centrifugado":                 { metodo:"",                   unidad:"%"             },
    "Indice de Iodo":               { metodo:"",                   unidad:""              },
    "Material insaponificable":     { metodo:"",                   unidad:""              },
    "MIU":                          { metodo:"",                   unidad:""              },
    "Monogliceridos":               { metodo:"EN 14105",           unidad:"mg/kg"         },
    "Digliceridos":                 { metodo:"EN 14105",           unidad:"mg/kg"         },
    "Triglicerido":                 { metodo:"EN 14105",           unidad:"mg/kg"         },
    "Glicerol libre":               { metodo:"EN 14105",           unidad:"mg/kg"         },
    "Glicerol total":               { metodo:"EN 14105",           unidad:"mg/kg"         },
    "Estabilidad oxidativa":        { metodo:"EN 14112",           unidad:"Horas"         },
    "Contenido de ester":           { metodo:"EN 14103",           unidad:"% m/m"         },
    "Metil ester acido linolenico": { metodo:"EN 14103",           unidad:"% m/m"         },
    "CSFT":                         { metodo:"ASTM D7501-12a",     unidad:"Segundos"      },
    "Punto de enturbiamiento":      { metodo:"ASTM D2500-16b",     unidad:"°C"            },
    "Viscosidad cinematica 40":     { metodo:"ASTM D445-15a",      unidad:"CST"           },
    "Contaminacion total":          { metodo:"EN 12662",           unidad:"mg/kg"         },
    "Materia Grasa":                { metodo:"IRAM 5503",          unidad:"%"             },
  };

  function param(name) {
    const r = new RegExp('[?&]' + name.replace(/[.*+?^${}()|[\]\\]/g, '\\$&') + '=([^&#]*)');
    const m = r.exec(location.search);
    return m ? decodeURIComponent(m[1].replace(/\+/g, ' ')) : '';
  }
  function set(id, val) {
    const el = document.getElementById(id);
    if (el) el.textContent = (val && val !== '-') ? val : '';
  }
  function mkTh(text) { const el = document.createElement('th'); el.textContent = text; return el; }
  function normalizar(n) { const l = n.trim(); return ALIAS[l] !== undefined ? ALIAS[l] : l; }

  function parsearEspecificaciones() {
    const raw = param('especificaciones');
    const mapa = {};
    if (!raw || raw === '-') return mapa;
    raw.split(';').forEach(par => {
      const idx = par.indexOf('|');
      if (idx > -1) mapa[normalizar(par.substring(0, idx))] = par.substring(idx + 1).trim();
    });
    return mapa;
  }

  function esOffSpec(valor, espec) {
    if (isNaN(valor) || !espec) return false;
    espec = espec.trim();
    const toF = s => parseFloat(s.replace(',', '.'));
    const lt  = espec.match(/^<\s*([\d.,]+)/);
    const gt  = espec.match(/^>\s*([\d.,]+)/);
    const rng = espec.match(/^([\d.,]+)\s*[-]+\s*([\d.,]+)/);
    if (lt)  return valor >= toF(lt[1]);
    if (gt)  return valor <= toF(gt[1]);
    if (rng) return valor < toF(rng[1]) || valor > toF(rng[2]);
    return false;
  }

  function formatearFecha(raw) {
    if (!raw || raw === '-') return raw;
    const d = new Date(raw);
    if (isNaN(d.getTime())) return raw;
    return String(d.getDate()).padStart(2,'0') + '/' +
           String(d.getMonth()+1).padStart(2,'0') + '/' +
           d.getFullYear();
  }

  function render() {
    set('producto',      param('producto'));
    set('numero',        param('numero'));
    set('fecha',         formatearFecha(param('fecha')));
    set('proveedor',     param('proveedor'));
    set('remito',        param('remito'));
    set('transporte',    param('transporte'));
    set('chofer',        param('chofer'));
    set('dni',           param('dni'));
    set('chasis',        param('chasis'));
    set('motivoReclamo', param('motivoReclamo'));
    set('precintos',     param('precintos'));
    set('observaciones', param('observaciones'));

    const detsRaw = param('determinaciones') || param('determinacionesamostrar');
    if (!detsRaw || detsRaw === '-') return;
    const dets  = detsRaw.split(',').map(normalizar).filter(Boolean);
    const specs = parsearEspecificaciones();
    const thead = document.getElementById('thead');
    const tbody = document.getElementById('tbody');

    ['MÉTODO','ESPECIFICACIÓN','UNIDAD'].forEach(label => {
      const tr = document.createElement('tr');
      tr.appendChild(mkTh(label));
      dets.forEach(d => {
        const cat = CATALOGO[d] || {};
        let val = '';
        if (label === 'MÉTODO')         val = cat.metodo || '';
        if (label === 'ESPECIFICACIÓN') val = specs[d]   || '';
        if (label === 'UNIDAD')         val = cat.unidad || '';
        const th = mkTh(val);
        tr.appendChild(th);
      });
      thead.appendChild(tr);
    });

    const trNames = document.createElement('tr');
    trNames.className = 'fila-nombres';
    trNames.appendChild(mkTh('MUESTRA'));
    dets.forEach(d => trNames.appendChild(mkTh(d.toUpperCase())));
    thead.appendChild(trNames);

    const muestrasRaw = param('muestras');
    if (!muestrasRaw || muestrasRaw === '-') return;
    const sep = muestrasRaw.includes(';') ? ';' : ',';

    muestrasRaw.split(sep).map(f => f.trim()).filter(Boolean).forEach(fila => {
      const celdas = fila.split('|');
      const tr = document.createElement('tr');
      const tdM = document.createElement('td');
      tdM.textContent = celdas[0] || '';
      tr.appendChild(tdM);
      dets.forEach(d => {
        const td  = document.createElement('td');
        const pos = ORDEN_MUESTRAS.indexOf(d);
        const val = (pos > 0 && celdas[pos] !== undefined) ? celdas[pos].trim() : '';
        td.textContent = val;
        if (specs[d] && val !== '' && esOffSpec(parseFloat(val.replace(',','.')), specs[d]))
          td.classList.add('off-spec');
        tr.appendChild(td);
      });
      tbody.appendChild(tr);
    });

    window.print();
  }

  document.addEventListener('DOMContentLoaded', render);
</script>
</body>
</html>
